--- ### 接口文档配置
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    show-extensions: true
  api-docs:
    enabled: ${springdoc.swagger-ui.enabled}
    path: /v3/api-docs
## 接口文档增强配置
nextdoc4j:
  enabled: true
  # 启用插件
  plugin:
    # 认证展示插件
    security:
      enabled: true
    # 枚举展示插件
    enum:
      enabled: true
